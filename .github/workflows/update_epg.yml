name: Update EPG

on:
  schedule:
    - cron: "0 7 * * *"   # 每天 UTC 07:00 自动运行（北京时间 15:00）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests lxml pytz

    - name: Run EPG Fix Script
      run: |
        mkdir -p epg
        python epg/fix_epg.py
 
    - name: Debug file tree
      run: |
      ls -R .

    - name: Run EPG Fix Script
  run: |
    set -e
    mkdir -p epg
    python epg/fix_epg.py

    - name: Commit updated EPG
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # 避免 epg.xml 不存在时报错
        git add epg/epg.xml || echo "No epg.xml to add"

        # 避免没有变化时报错
        git commit -m "Auto update EPG" || echo "No changes to commit"

        # 避免 push 失败导致 exit 128
        git push || echo "Nothing to push"
