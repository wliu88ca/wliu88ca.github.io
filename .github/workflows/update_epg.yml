name: Update EPG

on:
  schedule:
    - cron: "0 6 * * *"   # 多伦多时间 02:00 自动运行（UTC 06:00）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests lxml pytz

    - name: Run EPG Fix Script
      run: |
        mkdir -p epg
        python epg/fix_epg.py

    - name: Commit updated EPG
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add epg/epg.xml || echo "No epg.xml to add"
        git commit -m "Auto update EPG" || echo "No changes to commit"
        git push || echo "Nothing to push"
