name: Update EPG

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install Python dependencies
      run: |
        pip install requests lxml pytz
    
    - name: Run EPG Fix Script
      run: |
        python epg/fix_epg.py

    - name: Commit updated EPG
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add epg/epg.xml
        git commit -m "Auto update EPG" || echo "No changes"
        git push
